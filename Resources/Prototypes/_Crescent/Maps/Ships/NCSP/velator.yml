- type: vessel
  id: Velator
  name: ТС Велатор
  description: Легкий корвет, который некогда был разработан для РЭБ и саботажа. Ныне, это теперь лёгкий тайный исследовательский корабль для изучения артефактов и аномалий во всех уголках Тайпана. Несмотря на то, что он лишился РЭБ установки, его стелс система и вооружение остались на месте, но из-за этого его подготовка к исследованиям сильно снижена, вынуждая его владельцев докупать необходимое самостоятельно.
  price: 80000
  category: Medium
  group: None
  path: /Maps/_Crescent/Shuttles/NCSP/velator.yml

- type: gameMap
  id: Velator
  mapName: 'ТС Велатор'
  mapPath: /Maps/_Crescent/Shuttles/NCSP/velator.yml
  minPlayers: 0
  stations:
    Velator:
      stationProto: StandardCrescentVessel
      gridComponents:
        - type: MapIcon
          iconType: Shuttle
      components:
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: corvette
        - type: StationNameSetup
          mapNameTemplate: 'ТС Велатор {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: VesselDesignation
          designation: vessel-designation-electronic
