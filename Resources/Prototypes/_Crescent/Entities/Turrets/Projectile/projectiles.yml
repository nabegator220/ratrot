- type: entity
  id: Bullet20mmBase
  name: 20mm FMJ projectile
  description: Uh oh.
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectilePhasePrevent
    mask:
    - Impassable
    - BulletImpassable
  - type: ProjectileIFF
    visualType: Circle
    color: White
  - type: Projectile
    ignoreWeaponGrid: true
    damage:
      types:
        Structural: 80
        Piercing: 100
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: TimedDespawn
    lifetime: 14 #1960
  - type: Sprite
    sprite: _NF/Objects/SpaceArtillery/pdtcasing.rsi
    layers:
      - state: base-projectile
  - type: ShipWeaponProjectile

