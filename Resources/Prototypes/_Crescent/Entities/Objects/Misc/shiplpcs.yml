# #dsm

- type: entity
  parent: BaseItem
  id: ShipVoucherXenovalk
  name: DSM 'Xenovalk' pattern LPC fabprint disk
  description: An LPC fabprint disk loaded with an Imperial Xenovalk-class medical shuttle. Has to be redeemed at a shipyard console.
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Crescent/Objects/Misc/lpcchip.rsi
    layers:
    - state: icon
  - type: StaticPrice
    price: 25000
  - type: ShipVoucher
    ship: Xenovalk

