- type: entity
  parent: [ClothingOuterHardsuitSecurity, BaseIntegratedMagboot]
  id: ClothingOuterHardsuitBlueshield
  name: blueshield's hardsuit
  description: A special security hardsuit made for the Blueshield Officer, has extra armor yet somehow feels lighter.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/OuterClothing/Hardsuits/Combat/blueshield.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/OuterClothing/Hardsuits/Combat/blueshield.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING
      - state: equipped-OUTERCLOTHING-glow
        shader: unshaded
  - type: PressureProtection
    highPressureMultiplier: 0.45
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.5
        Piercing: 0.5
        Radiation: 0.5
        Heat: 0.5
        Caustic: 0.6
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitBlueshield
  - type: StaminaDamageResistance
    coefficient: 0.5 # 50%


# cybersun stealth

- type: entity
  parent: [BaseIntegratedMagboot, BaseIntegratedManeuveringThrusters, ClothingOuterBase, GeigerCounterClothing, AllowSuitStorageClothing]
  id: ClothingOuterHardsuitCybersunStealth
  suffix: stealth
  name: cybersun stealth hardsuit
  description: A hardsuit with stealth plating for operations, the shielding doesn't work while you're moving though! Needs the helmet on to finish the stealth field.
  components:
  # Rat-Change start: added a ClothingOuterHardsuitBase components cause on the original it has ClothingAddFaction component which this suit doesnt need at all.
  - type: TemperatureProtection
    coefficient: 0.01
  - type: FireProtection
    reduction: 0.75 # almost perfectly sealed, atmos firesuit is better
  - type: IgniteFromGasImmunity
    parts:
    - Torso
    - Groin
    - LeftArm
    - LeftHand
    - RightArm
    - RightHand
    - LeftLeg
    - LeftFoot
    - RightLeg
    - RightFoot
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:Container {}
  - type: GroupExamine
  - type: Geiger
    attachedToSuit: true
    localSoundOnly: true
  - type: StaminaDamageResistance
    coefficient: 0.75 # 25%
  - type: ClothingRequiredStepTriggerImmune
    slots: WITHOUT_POCKET
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 19
    staminaCost: 44
    soundHit:
      collection: MetalThud
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 400 # According to Google, a NASA Eva Suit weighs 68kg. Since Hardsuits are "Armored", I'm setting it to 100kg
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  # Rat-Change end.
  - type: Sprite
    sprite: _Crescent/Clothing/Syndicate/OuterClothing/cybersunstealth.rsi
  - type: Item
    size: Huge
  - type: Clothing
    sprite: _Crescent/Clothing/Syndicate/OuterClothing/cybersunstealth.rsi
    equipDelay: 2.5 # Hardsuits are heavy and take a while to put on/off.
    unequipDelay: 2.5
    #onEquipFunctions:
    #  - !type:TraitAddComponent
    #    components:
   #       - type: BreakStealthOnAttack
   # onUnequipFunctions:
    #  - !type:TraitRemoveComponent
     #   components:
     #     - type: BreakStealthOnAttack
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.65
  - type: DegradeableArmor
    armorMaxHealth: 630
    armorType: Ceramic
    armorRepair: PlasteelEncasedKevlar
    initialModifiers:
      flatReductions:
        Blunt: 10
        Slash: 25
        Piercing: 70
        Heat: 15
        Caustic: 15
        Radiation: 25
  - type: ClothingSpeedModifier
    walkModifier: 1.15
    sprintModifier: 1.15
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototypes:
      head: ClothingHeadHelmetHardsuitCybersunStealth
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon
    - HidesHarpyWings #DeltaV: Used by harpies to help render their hardsuit sprites
    - AllowLamiaHardsuit
    - FullBodyOuter
    - PlasmamanSafe
  - type: ReverseEngineering
    difficulty: 4
    recipes:
      - ClothingOuterHardsuitCybersunStealthCyberdawn
      - ClothingOuterHardsuitSyndieMedicCyberdawn
      - ClothingOuterHardsuitCybersun
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHardsuitLight
      params:
        volume: -15
        maxDistance: 3
        rolloffFactor: 1.2
        # SIGNIFICANTLY Quieter than a normal hardsuit, but not perfectly stealthy. If you move while people are close enough, they can still hear it.

# cybersun dreadnought

- type: entity
  parent: [ClothingOuterHardsuitBaseHeavy, BaseIntegratedMagboot, BaseIntegratedManeuveringThrusters]
  id: ClothingOuterHardsuitCybersunDreadnought
  name: CSA-105UA "Xíngtiān" tacsuit # https://en.wikipedia.org/wiki/Xingtian in case you were wondering where the name comes from.
  description: A rare and exotic horror from the minds of Sol's finest engineers. This suit is worn as a punishment for crimes against Mother Sol.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/OuterClothing/Hardsuits/dreadnought.rsi
  - type: Item
    size: Ginormous #damn its hard to spell
  - type: Clothing
    sprite: _Goobstation/Clothing/OuterClothing/Hardsuits/dreadnought.rsi
    equipDelay: 15
    unequipDelay: 1200 # if i add the unremovable comp then you couldnt even put this on - Diggy here, I added 600 more seconds in case you SOMEHOW had 10 minutes to take it off, now it's 20, enjoy.
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.3 # chinalake meta would go hard
  - type: FireProtection
    reduction: 0.9 # atmos fire suit is 0.8, so i guess this is fine? Reduction goes the opossite way right?
  - type: DegradeableArmor
    armorMaxHealth: 3000
    armorType: Ceramic
    armorRepair: HomelandAlloy
    initialModifiers:
      flatReductions:
        Blunt: 75
        Slash: 75
        Piercing: 90
        Heat: 55
        Caustic: 65
  - type: ClothingSpeedModifier
    walkModifier: 0.7
    sprintModifier: 0.5
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototypes:
      head: ClothingHeadHelmetHardsuitDreadnought
  - type: ClothingAddFaction
    faction: TFSC
  - type: ClothingGrantComponent
    component:
    - type: DamageOverTime
      damage:
        types:
          Piercing: 0.4
      interval: 1.0
      ignoreResistances: true
  - type: StaminaDamageResistance
    coefficient: 0.10 # 90% stamdgm resist
