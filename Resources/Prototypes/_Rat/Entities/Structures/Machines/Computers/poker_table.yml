- type: entity
  id: PokerTable
  name: покерный стол
  description: Стационарный стол для игры в Техасский Холдем. Нужны деньги чтобы сыграть.
  parent: BaseStructure
  components:
  - type: Icon
    sprite: Structures/Furniture/Tables/wood.rsi
    state: full
  - type: Sprite
    sprite: Structures/Furniture/Tables/wood.rsi
    layers:
    - state: full
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 1000
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: InteractionOutline
  - type: PokerTable
    bigBlind: 100
    smallBlind: 50
    maxPlayers: 6
    minPlayers: 2
    startingBuyIn: 2000
  - type: UserInterface
    interfaces:
      enum.PokerUiKey.Key:
        type: Content.Client._Rat.Poker.PokerTableBoundUserInterface
  - type: ActivatableUI
    key: enum.PokerUiKey.Key
