- type: entity
  parent: EncryptionKey
  id: EncryptionKeyTFSCCommand
  name: TFSC Command encryption key
  description: An encryption key used by the Syndicate Command.
  components:
  - type: EncryptionKey
    channels:
    - Syndicate
    - SyndicateCommand
    - Common
    defaultChannel: Common
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: common_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyNCWLCommand
  name: NCWL Command encryption key
  description: An encryption key used by the Union.
  components:
  - type: EncryptionKey
    channels:
    - NCWL
    - NCWLCommand
    - Common
    defaultChannel: Common
  - type: Sprite
    layers:
    - state: crypt_silver
    - state: com_label